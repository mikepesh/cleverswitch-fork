# CleverSwitch configuration example
# Copy to ~/.config/cleverswitch/config.yaml and edit as needed.

# Bolt receiver identification
# Usually auto-detected. Override only if you have multiple Bolt receivers
# and need to target a specific one.
receiver:
  vendor_id: 0x046D       # Logitech vendor ID (do not change)
  product_id: 0xC548      # Bolt receiver product ID (do not change)
  # path: "/dev/hidraw3"  # optional: force a specific device path (Linux)

# Hook scripts (all optional)
# Scripts are called asynchronously and never block the switch relay.
# Each script receives event details via environment variables:
#
#   CLEVERSWITCH_EVENT         switch | connect | disconnect
#   CLEVERSWITCH_DEVICE        keyboard | mouse
#   CLEVERSWITCH_DEVICE_NAME   MX Keys | MX Master 3
#   CLEVERSWITCH_TARGET_HOST   0 | 1 | 2     (switch events only, 0-based)
#   CLEVERSWITCH_PREVIOUS_HOST 0 | 1 | 2     (switch events only, 0-based)
#
hooks:
  # Called when a device switches host (keyboard switch triggers this for both)
  on_switch: []
  # Example:
  # on_switch:
  #   - path: "~/.config/cleverswitch/on_switch.sh"
  #     timeout: 5        # seconds before the script is killed (default: 5)

  # Called when a device connects to the receiver
  on_connect: []
  # Example:
  # on_connect:
  #   - path: "~/.config/cleverswitch/on_connect.py"
  #     timeout: 10

  # Called when a device disconnects from the receiver
  on_disconnect: []

# Behavior settings
settings:
  # How long to block on HID read before checking for shutdown signal (ms)
  read_timeout_ms: 1000

  # Seconds between reconnection attempts when receiver is lost
  retry_interval_s: 5

  # Maximum reconnection attempts (0 = retry indefinitely)
  max_retries: 0

  # Log level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
